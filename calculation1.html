<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>CalculatorUPGRADE</title>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
		/>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="main-container">
			<ul
				class="nav nav-pills mb-3 nav-justified"
				id="pills-tab"
				role="tablist"
			>
				<li class="nav-item" role="presentation">
					<button
						class="nav-link active"
						id="calc-tab"
						data-bs-toggle="pill"
						data-bs-target="#calc"
						type="button"
						role="tab"
					>
						Calculator
					</button>
				</li>
				<li class="nav-item" role="presentation">
					<button
						class="nav-link"
						id="unit-tab"
						data-bs-toggle="pill"
						data-bs-target="#unit"
						type="button"
						role="tab"
					>
						Unit Converter
					</button>
				</li>
				<li class="nav-item" role="presentation">
					<button
						class="nav-link"
						id="currency-tab"
						data-bs-toggle="pill"
						data-bs-target="#currency"
						type="button"
						role="tab"
					>
						Currency Converter
					</button>
				</li>
			</ul>

			<div class="tab-content" id="pills-tabContent">
				<div class="tab-pane fade show active" id="calc" role="tabpanel">
					<div class="calculator">
						<div class="display" id="display">0</div>
						<div class="buttons">
							<button class="btn gray" onclick="clearDisplay()">AC</button>
							<button class="btn gray" onclick="append('+/-')">+/-</button>
							<button class="btn gray" onclick="append('%')">%</button>
							<button class="btn operator" onclick="append('÷')">÷</button>

							<button class="btn" onclick="append('MC')">MC</button>
							<button class="btn" onclick="append('7')">7</button>
							<button class="btn" onclick="append('8')">8</button>
							<button class="btn" onclick="append('9')">9</button>

							<button class="btn" onclick="append('M+')">M+</button>
							<button class="btn" onclick="append('4')">4</button>
							<button class="btn" onclick="append('5')">5</button>
							<button class="btn" onclick="append('6')">6</button>

							<button class="btn" onclick="append('M-')">M-</button>
							<button class="btn" onclick="append('1')">1</button>
							<button class="btn" onclick="append('2')">2</button>
							<button class="btn" onclick="append('3')">3</button>

							<button class="btn" onclick="append('C')">C</button>
							<button class="btn" onclick="append('0')">0</button>
							<button class="btn" onclick="append('.')">.</button>
							<button class="btn erase" onclick="backspace()">
								<i class="fa-solid fa-delete-left"></i>
							</button>

							<button class="btn operator" onclick="append('+')">+</button>
							<button class="btn operator" onclick="append('−')">−</button>
							<button class="btn operator" onclick="append('×')">×</button>
							<button class="btn operator" onclick="calculate()">
								<i class="fa-solid fa-equals"></i>
							</button>
						</div>

						<button id="stickyToggleBtn" class="sticky-btn" title="History">
							<i class="fa-solid fa-file-lines"></i>
						</button>

						<div
							class="history-container collapsed"
							id="historyContainer"
							style="display: none"
						>
							<div class="history-header">
								<span>History</span>
								<button id="closeHistoryBtn">
									<!-- <i class="fa-solid fa-xmark"></i> -->
								</button>
							</div>
							<ul id="historyList"></ul>
						</div>
					</div>
				</div>

				<div class="tab-pane fade" id="unit" role="tabpanel">
					<div class="converter">
						<h4>Unit Converter</h4>
						<select id="unitType" onchange="populateUnits()">
							<option value="length">Length</option>
							<option value="weight">Weight</option>
							<option value="temperature">Temperature</option>
						</select>
						<div class="converter-row">
							<input type="number" id="unitInput" />
							<select id="fromUnit"></select>
						</div>
						<div class="converter-row">
							<input type="text" id="unitOutput" disabled />
							<select id="toUnit"></select>
						</div>
						<button onclick="convertUnit()">Convert</button>
					</div>
				</div>

				<div class="tab-pane fade" id="currency" role="tabpanel">
					<div class="converter">
						<h4>Currency Converter</h4>
						<div class="converter-row">
							<input type="number" id="currencyInput" />
							<select id="fromCurrency">
								<option value="INR">INR</option>
								<option value="USD">USD</option>
								<option value="EUR">EUR</option>
							</select>
						</div>
						<div class="converter-row">
							<input type="text" id="currencyOutput" disabled />
							<select id="toCurrency">
								<option value="USD">USD</option>
								<option value="INR">INR</option>
								<option value="EUR">EUR</option>
							</select>
						</div>
						<button onclick="convertCurrency()">Convert</button>
					</div>
				</div>
			</div>
		</div>
		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
		<script src="script.js"></script>
	</body>
</html>
